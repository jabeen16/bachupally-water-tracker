<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bachupally Water Tracker — Consumption</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <header>
    <h1>Bachupally Water Tracker</h1>
    <div class="header-actions">
      <nav class="nav-links">
        <a href="index.html" class="nav-active">Consumption</a>
        <a href="readings.html">Meter Readings</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="month-picker">
      <label for="month-select">Month:</label>
      <select id="month-select"></select>
    </section>

    <section id="summary-cards" class="cards"></section>

    <section class="table-section">
      <h2>Consumption Summary</h2>
      <div class="table-wrapper">
        <table id="consumption-table"></table>
      </div>
    </section>

    <section class="table-section">
      <h2>Per Day Usage</h2>
      <div class="table-wrapper">
        <table id="perday-table"></table>
      </div>
    </section>

    <section class="chart-section">
      <h2>Per Day Usage — All Rooms (Litres)</h2>
      <div class="chart-container chart-container-tall">
        <canvas id="all-rooms-chart"></canvas>
      </div>
    </section>

    <section class="chart-section">
      <h2>Per Day Trend — By Room (Litres)</h2>
      <p class="edit-hint">Click a room in the legend to show/hide it.</p>
      <div class="chart-container">
        <canvas id="single-room-chart"></canvas>
      </div>
    </section>
  </main>

  <footer>
    <p>Bachupally Water Tracker &mdash; Data stored in GitHub</p>
  </footer>

  <script src="shared.js"></script>
  <script src="consumption.js"></script>
</body>
</html>
