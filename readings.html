<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bachupally Water Tracker — Meter Readings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup Modal -->
  <div id="setup-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Login</h2>
      <p>Enter your access key to manage meter readings.</p>
      <input type="password" id="token-input" placeholder="Access key">
      <input type="hidden" id="repo-owner" value="jabeen16">
      <input type="hidden" id="repo-name" value="bachupally-water-tracker">
      <div class="modal-actions">
        <button id="save-token-btn" class="btn-primary">Save & Connect</button>
        <button id="cancel-setup-btn" class="btn-secondary">Cancel</button>
      </div>
      <p id="setup-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Add Reading Modal -->
  <div id="reading-modal" class="modal hidden">
    <div class="modal-content modal-wide">
      <h2>Add Meter Reading</h2>
      <div class="form-row">
        <label>Date:</label>
        <input type="date" id="reading-date">
      </div>
      <div id="reading-fields"></div>
      <div class="modal-actions">
        <button id="save-reading-btn" class="btn-primary">Save Reading</button>
        <button id="cancel-reading-btn" class="btn-secondary">Cancel</button>
      </div>
      <p id="reading-error" class="error hidden"></p>
    </div>
  </div>

  <header>
    <h1>Bachupally Water Tracker</h1>
    <div class="header-actions">
      <nav class="nav-links">
        <a href="index.html">Consumption</a>
        <a href="readings.html" class="nav-active">Meter Readings</a>
      </nav>
      <button id="settings-btn" class="btn-icon" title="Settings">&#9881;</button>
    </div>
  </header>

  <main>
    <section class="month-picker">
      <label for="month-select">Month:</label>
      <select id="month-select"></select>
    </section>

    <section class="table-section">
      <div class="chart-header">
        <h2>Meter Readings</h2>
        <div class="header-actions">
          <button id="add-reading-btn" class="btn-primary">+ Add Reading</button>
          <button id="save-edits-btn" class="btn-primary hidden">Save Changes</button>
        </div>
      </div>
      <p class="edit-hint">Click any reading value to edit it.</p>
      <div class="table-wrapper">
        <table id="readings-table"></table>
      </div>
    </section>
  </main>

  <footer>
    <p>Bachupally Water Tracker &mdash; Data stored in GitHub</p>
  </footer>

  <script src="shared.js"></script>
  <script src="readings.js"></script>
</body>
</html>
